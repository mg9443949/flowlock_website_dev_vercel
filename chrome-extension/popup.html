<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>FlowLock</title>
  <style>
    body { 
      width: 320px; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
      padding: 20px; 
      margin: 0; 
      background: #09090b; 
      color: #fafafa; 
    }
    h2 { 
      margin: 0 0 16px 0; 
      font-size: 20px; 
      color: #fafafa;
      font-weight: 700;
      letter-spacing: -0.025em;
    }
    .status { 
      margin-bottom: 8px; 
      font-weight: 600; 
      font-size: 15px;
    }
    .blocked-status { 
      margin-bottom: 20px; 
      font-size: 13px; 
      color: #a1a1aa; 
    }
    button { 
      width: 100%;
      padding: 10px; 
      background: #a855f7; 
      color: white; 
      border: none; 
      border-radius: 8px; 
      cursor: pointer; 
      font-weight: 600; 
      font-size: 14px;
      transition: background 0.15s ease;
    }
    button:hover { 
      background: #9333ea; 
    }
    button.destructive {
      background: #ef4444;
    }
    button.destructive:hover {
      background: #dc2626;
    }
    .hidden { 
      display: none; 
    }
    .cta-container {
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <h2>FlowLock Vault</h2>
  <div id="statusContainer" class="status">Checking connection...</div>
  <div id="blockedStatusContainer" class="blocked-status hidden"></div>
  
  <div id="loginForm" class="hidden cta-container">
    <button id="connectBtn">Connect with FlowLock</button>
  </div>

  <div id="connectedView" class="hidden">
    <button id="logoutBtn" class="destructive">Disconnect</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
